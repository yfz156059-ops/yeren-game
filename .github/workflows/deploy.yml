name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 175.178.49.80 >> ~/.ssh/known_hosts

      - name: SCP files to server
        run: |
          scp -i ~/.ssh/deploy_key index.html root@175.178.49.80:/www/wwwroot/175.178.49.80/
          scp -i ~/.ssh/deploy_key -r asset/ root@175.178.49.80:/www/wwwroot/175.178.49.80/

      - name: Ensure nginx is running
        run: |
          ssh -i ~/.ssh/deploy_key root@175.178.49.80 "pgrep nginx > /dev/null || nginx && echo 'deployed at $(date)'"
