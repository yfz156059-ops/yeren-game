name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy via SSH (git pull on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.128.8.73
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /tmp/yeren-game && git pull origin main && cp index.html /www/wwwroot/43.128.8.73/ && cp -r asset/ /www/wwwroot/43.128.8.73/ && echo "deployed at $(date)"
