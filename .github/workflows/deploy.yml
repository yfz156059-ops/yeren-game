name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Copy files via SCP (key auth)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 43.128.8.73
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "index.html,asset/"
          target: /www/wwwroot/43.128.8.73/
          rm: false
